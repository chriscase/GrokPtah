name: Desktop

on:
  push:
    paths:
      - "desktop/**"
      - "crates/codegen/grokptah-agent-bridge/**"
      - "evals/**"
      - ".github/workflows/desktop.yml"
  pull_request:
    paths:
      - "desktop/**"
      - "crates/codegen/grokptah-agent-bridge/**"
      - "evals/**"

jobs:
  desktop:
    runs-on: macos-latest
    defaults:
      run:
        working-directory: desktop
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: desktop/package-lock.json
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.92.0"
          components: rustfmt, clippy
      - name: Install frontend deps
        run: npm ci
      - name: Typecheck + unit tests
        run: |
          npm run typecheck
          npm test
      - name: Cargo check + unit tests (desktop)
        working-directory: desktop/src-tauri
        run: |
          cargo check
          cargo test
      - name: Bridge fmt + clippy + tests
        # Bridge is its own Cargo workspace root (path dep of desktop).
        working-directory: crates/codegen/grokptah-agent-bridge
        run: |
          cargo fmt --check
          cargo clippy --all-targets -- -D warnings
          cargo test
      - name: Offline parity oracles (no network)
        # Structured oracle unit tests + fixture selftests; live suite is on-demand.
        working-directory: crates/codegen/grokptah-agent-bridge
        run: cargo test eval_oracle -- --nocapture
      - name: Offline oracle suite shape (repo root)
        working-directory: .
        run: |
          test -f evals/tasks.json
          test -f evals/oracle_selftest/pass_exact/artifact.txt
          test -f evals/oracle_selftest/fail_exact/artifact.txt
          python3 - <<'PY'
          import json
          from pathlib import Path
          tasks = json.loads(Path("evals/tasks.json").read_text())
          hard = [t for t in tasks if t.get("difficulty") != "smoke"]
          assert hard, "need hard discriminating tasks"
          for t in hard:
              ty = t["success"]["type"]
              assert ty in ("command", "all", "exact_file"), (t["id"], ty)
          print(f"ok: {len(tasks)} tasks, {len(hard)} hard, structured oracles")
          PY
