name: Desktop

on:
  push:
    paths:
      - "desktop/**"
      - "crates/codegen/grokptah-agent-bridge/**"
      - ".github/workflows/desktop.yml"
  pull_request:
    paths:
      - "desktop/**"
      - "crates/codegen/grokptah-agent-bridge/**"

jobs:
  desktop:
    runs-on: macos-latest
    defaults:
      run:
        working-directory: desktop
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: desktop/package-lock.json
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.92.0"
          components: rustfmt, clippy
      - name: Install frontend deps
        run: npm ci
      - name: Typecheck + unit tests
        run: |
          npm run typecheck
          npm test
      - name: Cargo check + unit tests (desktop)
        working-directory: desktop/src-tauri
        run: |
          cargo check
          cargo test
      - name: Bridge fmt + clippy + tests
        # Bridge is its own Cargo workspace root (path dep of desktop).
        working-directory: crates/codegen/grokptah-agent-bridge
        run: |
          cargo fmt --check
          cargo clippy --all-targets -- -D warnings
          cargo test
